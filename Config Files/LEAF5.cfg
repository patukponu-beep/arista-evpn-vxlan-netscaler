service routing protocols model multi-agent
!
logging console notifications
!
hostname LEAF5
!
spanning-tree mode mstp
!
vlan 10,20,30
!
vrf instance PROD
!
interface Ethernet1
   switchport trunk allowed vlan 20,30
   switchport mode trunk
!
interface Ethernet2
!
interface Ethernet3
   no switchport
   ip address 35.1.1.1/30
!
interface Ethernet4
   no switchport
   ip address 45.1.1.1/30
!
interface Ethernet5
   no switchport
   ip address 100.1.1.1/30
!
interface Loopback0
   ip address 5.5.5.5/32
!
interface Management1
!
interface Vlan10
   vrf PROD
   ip address 172.16.10.1/24
!
interface Vlan20
   vrf PROD
   ip address 172.16.20.1/24
!
interface Vlan30
   ip address 172.16.30.1/24
!
interface Vxlan1
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vrf PROD vni 50000
!
ip routing
ip routing vrf PROD
!
router bgp 65005
   router-id 5.5.5.5
   rd auto
   maximum-paths 2
   neighbor EDGE-ROUTER peer group
   neighbor EDGE-ROUTER remote-as 65100
   neighbor EVPN-SPINES peer group
   neighbor EVPN-SPINES remote-as 65000
   neighbor EVPN-SPINES update-source Loopback0
   neighbor EVPN-SPINES ebgp-multihop 3
   neighbor EVPN-SPINES send-community extended
   neighbor EVPN-SPINES maximum-routes 12000
   neighbor UNDERLAY-SPINES peer group
   neighbor UNDERLAY-SPINES remote-as 65000
   neighbor UNDERLAY-SPINES send-community
   neighbor 3.3.3.3 peer group EVPN-SPINES
   neighbor 4.4.4.4 peer group EVPN-SPINES
   neighbor 35.1.1.2 peer group UNDERLAY-SPINES
   neighbor 45.1.1.2 peer group UNDERLAY-SPINES
   neighbor 100.1.1.2 peer group EDGE-ROUTER
   neighbor 100.1.1.2 remote-as 65100
   !
   vlan 10
      rd auto
      route-target both 10010:10010
      redistribute learned
   !
   vlan 20
      rd auto
      route-target both 10020:10020
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-SPINES activate
   !
   address-family ipv4
      network 5.5.5.5/32
      network 172.16.30.0/24
   !
   vrf PROD
      route-target import evpn 50000:50000
      route-target export evpn 50000:50000
      redistribute connected
!
end