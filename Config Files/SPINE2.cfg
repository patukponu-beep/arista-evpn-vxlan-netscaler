service routing protocols model multi-agent
!
logging console notifications
!
hostname SPINE2
!
spanning-tree mode mstp
!
interface Ethernet1
   no switchport
   ip address 24.1.1.2/30
!
interface Ethernet2
   no switchport
   ip address 14.1.1.2/30
!
interface Ethernet3
!
interface Ethernet4
   no switchport
   ip address 45.1.1.2/30
!
interface Loopback0
   ip address 4.4.4.4/32
!
interface Management1
!
ip routing
!
router bgp 65000
   router-id 4.4.4.4
   neighbor EVPN-LEAFS peer group
   neighbor EVPN-LEAFS next-hop-unchanged
   neighbor EVPN-LEAFS update-source Loopback0
   neighbor EVPN-LEAFS ebgp-multihop 3
   neighbor EVPN-LEAFS send-community extended
   neighbor EVPN-LEAFS maximum-routes 12000
   neighbor UNDERLAY-LEAFS peer group
   neighbor UNDERLAY-LEAFS send-community
   neighbor UNDERLAY-LEAFS maximum-routes 12000
   neighbor 1.1.1.1 peer group EVPN-LEAFS
   neighbor 1.1.1.1 remote-as 65001
   neighbor 2.2.2.2 peer group EVPN-LEAFS
   neighbor 2.2.2.2 remote-as 65002
   neighbor 5.5.5.5 peer group EVPN-LEAFS
   neighbor 5.5.5.5 remote-as 65005
   neighbor 14.1.1.1 peer group UNDERLAY-LEAFS
   neighbor 14.1.1.1 remote-as 65001
   neighbor 24.1.1.1 peer group UNDERLAY-LEAFS
   neighbor 24.1.1.1 remote-as 65002
   neighbor 45.1.1.1 peer group UNDERLAY-LEAFS
   neighbor 45.1.1.1 remote-as 65005
   !
   address-family evpn
      neighbor EVPN-LEAFS activate
   !
   address-family ipv4
      network 4.4.4.4/32
!
end